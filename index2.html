<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coding conf Tickets</title>
    <link href="./output.css" rel="stylesheet">
    <style>
        body {
            background-image: url(pattern-squiggly-line-bottom-desktop.svg),
                url(pattern-squiggly-line-top.svg),
                url(pattern-lines.svg),
                url(background-desktop.png);

            background-size: 70%, 30%, 100%, cover;
            background-position: left bottom, top right, center top, center;
            background-repeat: no-repeat, no-repeat, no-repeat, no-repeat;
            background-attachment: fixed, fixed, fixed, fixed;
            width: 100%;
        }
    </style>

</head>

<body>
    <header>
        <div class="mt-4 flex flex-row justify-center"><img class="scale-50" src="logo-mark.svg" alt="" ;>
            <h1 class="text-center font-bold black text-white text-2xl">Coding conf</h1>
        </div>
        <div>
            <h1 id="congrats" class=" mt-7 text-center text-5xl font-extrabold text-orange-500">CONGRATS, ! <br> YOUR TICKETS ARE READY </h1>
            
            <p id="emailnotification" class="mt-4 text-center font-semibold text-gray-400  "></p>
        </div>
    </header>
    <div class="mt-4 w-fit mx-auto flex relative">
        <img src="pattern-ticket.svg" alt="">
    <div class="absolute inset-0 mt-5 ml-5 ">
        <img src="logo-full.svg" alt="">
        <h6 id="date" class="mt-2 text-gray-300"></h6>
        <div class="mt-auto mb-10 flex">
            <img id="avatar" src="" alt="" class="w-24 h-32 m-8">
            <div class="flex flex-col justify-center">
                <h1 class="text-white  font-bold mb-5" id="name">Name</h1>
                <h1 class="text-white text-2xl font-bold" id="git">@githubUsername</h1>
            </div>
            
    </div>
    </div>

    
            
    </div>
    
</div>

<script src="code.js"></script>

</body>

   
</html>
