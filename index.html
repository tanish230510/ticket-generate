<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coding conf</title>
    <link href="./output.css" rel="stylesheet">
    <style>
        body {
            background-image: url(pattern-squiggly-line-bottom-desktop.svg),
                url(pattern-squiggly-line-top.svg),
                url(pattern-lines.svg),
                url(pattern-circle.svg),
                url(pattern-circle.svg),
                url(background-desktop.png);

            background-size: 70%, 30%, 100%,15%,13%, cover;
            background-position: left bottom, top right, center top,70px -100px, 1000px 400px   ,center;
            background-repeat: no-repeat, no-repeat, no-repeat, no-repeat,no-repeat,no-repeat;
            background-attachment: fixed, fixed, fixed, fixed,fixed,fixed;
            width: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            margin-top: 25px;
        }


        form label {
            width: 36rem;  
            text-align: left;
            font-weight: bold;
            color: white;
        }

        
        input[type="text"],
        input[type="email"] {
            width: 36rem; 
            height: 3rem;
            border-radius: 12px;
            border: 1px solid white;
            background-color: rgba(255, 255, 255, 0.125);
            color: white;
            font-weight: 700;
            padding-left: 15px; 
            box-sizing: border-box;
            
        }


        button{
            width: 36rem;
            height: 3rem;
            border-radius: 12px;
            background-color: rgb(240, 59, 59);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-align: center;
        }
    </style>

</head>

<body>
    <header>
        <div class="mt-4 flex flex-row justify-center"><img class="scale-50" src="logo-mark.svg" alt="" ;>
            <h1 class="text-center font-bold black text-white text-2xl">Coding conf</h1>
        </div>
        <div>
            <h1 class=" mt-7 text-center font-bold text-white text-5xl">Your Journy to coding conf </h1>
            <h1 class=" mt-3 text-center font-bold text-white text-5xl">2026 is start
                here!</h1>
                <p class="mt-4 text-center font-semibold text-gray-400  ">secure your slot at next year's biggest codeing conference</p>
        </div>
    </header>

    <div class=" flex flex-col items-center justify-center p-3">
            <h2 class="mt-7 font-semibold text-white" style="right: 18%; position: relative;">UPLOAD AVATAR</h2>
        
            <div class="px-[15%] mt-5 text-center rounded-lg border-dashed border-2 border-gray-300
         hover:border-blue-500 transition duration-300 ease-in-out transform hover:scale-105 hover:shadow-md" 
         id="dropzone" style="background-color: rgba(255, 255, 255, 0.236);">
            <label for="fileInput" class="cursor-pointer flex flex-col items-center space-y-2">
                
                <img src="icon-upload.svg" alt="" class="mt-4">
                <span class="text-gray-100">Drag and drop your files here</span>
                <span class="text-gray-100 text-sm">(or click to select)</span>
            </label>
            <input type="file" id="fileInput" class="hidden" multiple>
        </div>
        <div class="mt-6 text-center" id="fileList"></div>
          
        <div class="mt-2 text-gray-500 " style="right: 10%;position: relative;">ⓘ Upload your Photo ( JPG OR PNG,Max size: 500KB) 
         </div>
         
<form id="formm" class="flex flex-col items-center space-y-2 text-white">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="exampl@gmail.com" >
    <label for="githubUsername">Github Username</label>
    <input type="text" id="githubUsername" name="githubUsername" placeholder="@yourusername"  >
    <button type="submit">Generate your Tickets</button>
</form>
         
  </div>





    <script src="code.js"></script>

</body>

</html>
